{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2>Dish Manager</h2>
  <p class="muted">Create, publish, sort, and upload validated images for menu items.</p>
  <form method="post" action="{{ url_for('catalog.create_dish') }}" hx-post="{{ url_for('catalog.create_dish') }}" hx-target="#manager-dish-table" hx-swap="afterbegin" class="stack">
    <input type="hidden" name="csrf_token" value="">
    <label>Name <input type="text" name="name" required></label>
    <label>Description <textarea name="description"></textarea></label>
    <label>Base price <input type="number" min="0" step="0.01" name="base_price" required></label>
    <label>Category name <input type="text" name="category_name" required></label>
    <label>Tags (comma separated) <input type="text" name="tags"></label>
    <label>Stock quantity <input type="number" min="0" name="stock_quantity" value="0"></label>
    <label>Sort order <input type="number" name="sort_order" value="0"></label>
    <label><input type="checkbox" name="is_published" value="true"> Publish immediately</label>
    <input type="hidden" name="availability_windows" value='[]'>
    <input type="hidden" name="options" value='[{"name":"Portion Size","code":"portion_size","display_type":"single_select","rules":[{"rule_type":"single_select_required","is_required":true,"min_select":1,"max_select":1}],"values":[{"label":"Regular","value_code":"regular","price_delta":"0.00"},{"label":"Large","value_code":"large","price_delta":"2.00"}]}]'>
    <button type="submit">Create dish</button>
  </form>
  <div id="manager-dish-table" class="stack">
    {% for dish in dishes %}
      {% include "partials/manager_dish_row.html" %}
    {% endfor %}
  </div>
</section>
{% endblock %}
