<article class="card">
  <h3>{{ dish.name }}</h3>
  <p>{{ dish.description }}</p>
  <form method="post" action="{{ url_for('orders.add_cart_item') }}" hx-post="{{ url_for('orders.add_cart_item') }}" hx-target="#cart-panel" class="stack">
    <input type="hidden" name="csrf_token" value="">
    <input type="hidden" name="dish_id" value="{{ dish.id }}">
    <label>
      Quantity
      <input type="number" name="quantity" min="1" value="1">
    </label>
    {% for option in dish.options %}
      <fieldset
        hx-post="{{ url_for('catalog.validate_dish_selection', dish_id=dish.id) }}"
        hx-trigger="change"
        hx-target="#selection-status-{{ dish.id }}"
        hx-include="closest form"
        hx-swap="innerHTML"
      >
        <legend>{{ option.name }}{% for rule in option.rules %}{% if rule.is_required %} <span class="required-marker">(required)</span>{% endif %}{% endfor %}</legend>
        {% for value in option.values %}
          <label>
            <input type="{{ 'checkbox' if option.display_type == 'multi_select' else 'radio' }}" name="option_{{ option.code }}" value="{{ value.value_code }}">
            {{ value.label }} {% if value.price_delta %}(+${{ "%.2f"|format(value.price_delta) }}){% endif %}
          </label>
        {% endfor %}
      </fieldset>
    {% endfor %}
    <div id="selection-status-{{ dish.id }}" class="selection-feedback"></div>
    <button type="submit">Add to cart</button>
  </form>
</article>
